<!doctype html>
<html lang="pt" name="">
  <head>
    <meta charset="UTF-8" name="" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
      name=""
    />
    <link rel="stylesheet" href="styles.css" name="" />
    <title>calculator</title>
  </head>
  <body>
    <div id="calculadora" name="">
      <div class="result">
        <p id="mostrar"></p></div>
      <div id="buttons" name="">
        <button class="button num" name="CE">CE</button>
        <button class="button num" name="C">C</button>
        <button class="button num" name="/">÷</button>
        <button class="button num" name="1">1</button>
        <button class="button num" name="2">2</button>
        <button class="button num" name="3">3</button>
        <button class="button num" name="x">x</button>
        <button class="button num" name="4">4</button>
        <button class="button num" name="5">5</button>
        <button class="button num" name="6">6</button>
        <button class="button num" name="+">+</button>
        <button class="button num" name="7">7</button>
        <button class="button num" name="8">8</button>
        <button class="button num" name="9">9</button>
        <button class="button num" name="-">-</button>
        <button class="button num" name=".">.</button>
        <button class="button num" name="0">0</button>
        <button class="button num" name="=">=</button>
     
      </div>
    </div>

    <script src="script.js" name=""></script>
  </body>
</html>
